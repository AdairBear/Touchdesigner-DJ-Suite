[pytest]
# Pytest configuration for TouchDesigner DJ Suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=python
    --cov-report=term-missing
    --cov-report=html

# Markers for test categorization
markers =
    hardware: Tests requiring hardware (camera, OBS, TouchDesigner)
    integration: Integration tests
    slow: Slow-running tests
    unit: Unit tests

# Coverage options
[coverage:run]
source = python
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
